<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cierre de OF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <!-- Popup de login -->
    <div id="modal-login" class="modal-overlay" style="display: {{ 'none' if usuario else 'flex' }};">
        <div class="modal-box">
            <h2>Identifícate</h2>
            <p>Introduce tu usuario o correo para continuar:</p>
            <input type="text" id="input-usuario" placeholder="nombre@sanycces.com">
            <button onclick="guardarUsuario()">Entrar</button>
            <p id="login-error" class="error-text"></p>
        </div>
    </div>

    <main class="contenedor">
        <h1>Cierre de Orden de Fabricación</h1>
        <p class="usuario-actual">Usuario: <span id="usuario-actual">{{ usuario or '' }}</span></p>
        <div id="mensaje-general" class="mensaje">
            <!-- Botón para cambiar de usuario -->
            <button id="btn-cambiar-usuario" type="button" class="btn-secundario" onclick="cerrarSesion()">
                Cerrar sesión / Cambiar usuario
            </button>
        </div>

        <!-- Paso A: leer/escribir número de OF -->
        <section id="bloque-of">
            <label for="input-of">Número de OF</label>
            <div class="input-con-boton">
                <input type="text" id="input-of" placeholder="Ej: OF112612269" autofocus>
                <button id="btn-camara-of" onclick="abrirCamara('of')">📷</button>
            </div>
            <button id="btn-buscar" onclick="buscarOF()">Buscar</button>
            <p id="of-error" class="error-text"></p>
        </section>

        <!-- Bloque de información general -->
        <section id="bloque-info" style="display:none;">
            <h2>Información general</h2>
            <table class="tabla-info">
                <tr><td>Número OF</td><td id="info-numero_of"></td></tr>
                <tr><td>Estado</td><td id="info-estado"></td></tr>
                <tr><td>Fecha inicio</td><td id="info-fecha_inicio"></td></tr>
                <tr><td>Artículo</td><td id="info-articulo"></td></tr>
                <tr><td>Descripción</td><td id="info-descripcion"></td></tr>
                <tr><td>EAN</td><td id="info-ean"></td></tr>
                <tr><td>Línea</td><td id="info-linea"></td></tr>
                <tr><td>Cantidad lanzada</td><td id="info-cantidad"></td></tr>
            </table>

            <!-- Bloque de número de serie -->
            <div id="bloque-serie" style="display:none;">
                <label for="input-serie">Número de serie</label>
                <div class="input-con-boton">
                    <input type="text" id="input-serie" placeholder="Escanea o escribe el nº de serie">
                    <button onclick="abrirCamara('serie')">📷</button>
                </div>
            </div>

            <button id="btn-guardar" onclick="guardarCierre()">Guardar cierre</button>
            <p id="guardar-mensaje"></p>
        </section>
    </main>

    <!-- Modal de cámara -->
    <div id="modal-camara" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h2>Escanea el código</h2>
            <div id="lector-camara" style="width:100%;"></div>
            <button onclick="cerrarCamara()">Cancelar</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/html5-qrcode.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
